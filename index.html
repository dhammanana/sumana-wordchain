<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WordChain - A multiplayer word chain game for learning English" />
  <meta name="theme-color" content="#6c5ce7" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>WordChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="min-h-screen">
  <!-- Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div id="app">
    <!-- Top Bar -->
    <header id="top-bar" class="glass sticky top-0 z-40 flex items-center justify-between px-container-padding-mobile md:px-container-padding-desktop py-3 border-b border-glass-border">
      <a href="#/" class="flex items-center gap-3 group">
        <div class="w-9 h-9 rounded-xl bg-primary/15 flex items-center justify-center group-hover:bg-primary/25 transition-all">
          <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings:'FILL'1">hub</span>
        </div>
        <h1 class="font-display text-display-md font-extrabold text-gradient hidden sm:block">WordChain</h1>
        <h1 class="font-display text-heading-md font-extrabold text-gradient sm:hidden">WC</h1>
      </a>
      <div class="flex items-center gap-3">
        <span id="connection-status" class="w-2 h-2 rounded-full bg-secondary hidden" title="Connected"></span>
        <div id="user-badge" class="hidden flex items-center gap-2 px-3 py-1.5 rounded-xl bg-glass border border-glass-border">
          <span id="user-gems" class="text-label-sm text-warning font-bold">0 💎</span>
          <div class="w-1 h-1 rounded-full bg-dark-border"></div>
          <span id="user-name-display" class="text-body-sm text-dark-text-muted max-w-[100px] truncate"></span>
        </div>
        <button id="profile-btn" class="w-9 h-9 flex items-center justify-center rounded-xl text-dark-text-muted hover:bg-glass-light hover:text-dark-text transition-all">
          <span class="material-symbols-outlined text-xl">account_circle</span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="view-container" class="max-w-[800px] mx-auto px-container-padding-mobile md:px-container-padding-desktop py-6 min-h-[calc(100vh-130px)]">
      <div id="view-content" class="animate-fade-in"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="glass fixed bottom-0 left-0 w-full z-40 flex justify-around items-center px-container-padding-mobile pb-3 pt-2 border-t border-glass-border rounded-t-3xl">
      <a href="#/" class="nav-item" data-route="/">
        <span class="material-symbols-outlined text-xl">home</span>
        <span class="text-label-sm mt-0.5">Home</span>
      </a>
      <a href="#/history" class="nav-item" data-route="/history">
        <span class="material-symbols-outlined text-xl">history</span>
        <span class="text-label-sm mt-0.5">History</span>
      </a>
      <a href="#/profile" class="nav-item" data-route="/profile">
        <span class="material-symbols-outlined text-xl">person</span>
        <span class="text-label-sm mt-0.5">Profile</span>
      </a>
    </nav>

    <!-- Dictionary Modal -->
    <div id="dictionary-modal" class="modal-backdrop hidden opacity-0 transition-opacity duration-300">
      <div id="modal-content" class="glass-strong w-full max-w-md rounded-3xl overflow-hidden scale-95 transition-transform duration-300 max-h-[85vh] overflow-y-auto">
        <div class="p-6 pb-4 border-b border-glass-border">
          <div class="flex items-center justify-between">
            <div>
              <h4 id="modal-word" class="font-display text-heading-lg font-extrabold text-gradient uppercase"></h4>
              <p id="modal-phonetic" class="text-body-sm text-dark-text-muted mt-1 italic"></p>
            </div>
            <button id="modal-close" class="w-9 h-9 flex items-center justify-center rounded-xl bg-glass text-dark-text-muted hover:bg-glass-light hover:text-dark-text transition-all">
              <span class="material-symbols-outlined text-lg">close</span>
            </button>
          </div>
        </div>
        <div id="modal-body" class="p-6 space-y-4">
          <div class="flex items-center gap-2 mb-3">
            <span class="material-symbols-outlined text-primary text-sm">menu_book</span>
            <span class="text-label-sm text-dark-text-muted tracking-wider">DEFINITIONS</span>
          </div>
          <div id="modal-definitions" class="space-y-4">
            <div class="skeleton h-20 rounded-xl"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-[60] space-y-2 pointer-events-none"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
